version: '3.8'

services:
  airport-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: airport-monitor:latest
    container_name: airport-monitor
    
    # Port mapping
    ports:
      - "3000:3000"
    
    # Volume mounts for data persistence
    volumes:
      - ./data:/app/data
      # Optional: Mount custom config
      # - ./config.json:/app/data/config.json:ro
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      # Optional: Timezone
      # - TZ=Asia/Shanghai
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional, uncomment to enable)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
